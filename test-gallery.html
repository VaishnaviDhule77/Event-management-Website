<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Animation Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #333;
        }

        .gallery-section {
            padding: 4rem 2rem;
            background: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            height: 250px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
        }

        .gallery-item.animate {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.05) rotate(1deg);
            box-shadow: 0 20px 40px rgba(255, 107, 53, 0.4), 0 0 20px rgba(255, 107, 53, 0.2);
            z-index: 10;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.15) rotate(-1deg);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay h3 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .gallery-overlay p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }

        h2 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #FF6B35;
        }
    </style>
</head>

<body>
    <div class="spacer">
        Scroll Down to See Gallery Animations ↓
    </div>

    <section class="gallery-section">
        <h2>Wedding Gallery - Animated!</h2>
        <div class="gallery-grid">
            <div class="gallery-item" data-index="0">
                <img src="https://picsum.photos/seed/wedding1/800/600" alt="Traditional Wedding">
                <div class="gallery-overlay">
                    <h3>Traditional Wedding</h3>
                    <p>Mumbai, 2024</p>
                </div>
            </div>
            <div class="gallery-item" data-index="1">
                <img src="https://picsum.photos/seed/wedding2/800/600" alt="Beach Wedding">
                <div class="gallery-overlay">
                    <h3>Beach Wedding</h3>
                    <p>Goa, 2024</p>
                </div>
            </div>
            <div class="gallery-item" data-index="2">
                <img src="https://picsum.photos/seed/wedding3/800/600" alt="Royal Palace Wedding">
                <div class="gallery-overlay">
                    <h3>Royal Palace Wedding</h3>
                    <p>Jaipur, 2024</p>
                </div>
            </div>
            <div class="gallery-item" data-index="3">
                <img src="https://picsum.photos/seed/wedding4/800/600" alt="Garden Wedding">
                <div class="gallery-overlay">
                    <h3>Garden Wedding</h3>
                    <p>Bangalore, 2024</p>
                </div>
            </div>
            <div class="gallery-item" data-index="4">
                <img src="https://picsum.photos/seed/wedding5/800/600" alt="Destination Wedding">
                <div class="gallery-overlay">
                    <h3>Destination Wedding</h3>
                    <p>Kerala, 2024</p>
                </div>
            </div>
            <div class="gallery-item" data-index="5">
                <img src="https://picsum.photos/seed/wedding6/800/600" alt="Modern Wedding">
                <div class="gallery-overlay">
                    <h3>Modern Wedding</h3>
                    <p>Delhi, 2024</p>
                </div>
            </div>
        </div>
    </section>

    <div class="spacer">
        Animations Complete! ✨
    </div>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function () {
            console.log('Page loaded, initializing gallery animations...');
            initGalleryAnimations();
        });

        // Gallery Animation Initialization
        function initGalleryAnimations() {
            const galleryItems = document.querySelectorAll('.gallery-item');
            console.log('Found gallery items:', galleryItems.length);

            // Intersection Observer for scroll-triggered animations
            const observerOptions = {
                threshold: 0.15,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        // Get the index from the data attribute for stagger effect
                        const itemIndex = parseInt(entry.target.getAttribute('data-index'));
                        console.log('Animating item:', itemIndex);

                        // Add staggered delay based on item position
                        setTimeout(() => {
                            entry.target.classList.add('animate');
                        }, itemIndex * 100); // 100ms delay between each item

                        observer.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            // Observe all gallery items
            galleryItems.forEach(item => {
                observer.observe(item);
            });

            console.log('Gallery animation observer initialized');
        }
    </script>
</body>

</html>
